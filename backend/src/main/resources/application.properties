server.port=8080
server.address=0.0.0.0

spring.datasource.url=jdbc:postgresql://localhost:5432/smartcampus
spring.datasource.username=ybenayed
spring.datasource.password=ybenayed
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# IMPORTANT POSTGIS
spring.jpa.properties.hibernate.dialect=org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect


# --- API SNCF / Navitia ---
navitia.token=79f76734-6a86-48e3-88e7-844caf33df4e
navitia.base-url=https://api.sncf.com/v1/coverage/sncf
 
# Centre de recherche pour l'import des gares (Bordeaux)
navitia.center-lat=44.841225
navitia.center-lon=-0.5800364
navitia.radius-meters=20000
 
# Cache des passages temps reel (en secondes) - evite de re-appeler
# Navitia a chaque requete frontend sur la MEME gare
navitia.cache-ttl-seconds=60
 
# Gares "surveillees" par le scheduler : mets ici les 2-3 gares
# les plus utiles pour ton observatoire (ex: Bordeaux Saint-Jean).
# Recupere les navitiaId via GET /api/stationTer apres l'import.
navitia.watched-stations=stop_area:SNCF:87581009
 
# Intervalle de rafraichissement du scheduler (ms) - 30 min par defaut
# Voir le calcul de quota dans StationTerScheduler.java avant de reduire ce chiffre.
navitia.refresh-interval-ms=1800000